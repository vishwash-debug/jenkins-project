---
- name: Deploy Docker container on worker node
  hosts: worker
  become: true

  vars:
    app_dir: /home/ubuntu/app

  tasks:

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory

    - name: Copy project files to remote server
      copy:
        src: "{{ playbook_dir }}/../"
        dest: "{{ app_dir }}"

    - name: Build Docker image
      command: docker build -t myapp .
      args:
        chdir: "{{ app_dir }}"

    - name: Stop old container
      command: docker rm -f myapp-container
      ignore_errors: yes

    - name: Run container
      command: docker run -d -p 8080:8080 --name myapp-container myapp
