<!DOCTYPE html>
<html>
<head>
    <title>Zomato Clone</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f8f8f8;
        }

        h1 {
            text-align: center;
            color: red;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            margin: 15px;
            width: 280px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 8px gray;
        }

        img {
            width: 100%;
            height: 180px;
        }

        .content {
            padding: 10px;
        }
    </style>
</head>
<body>

<h1>🍽️ Zomato Clone</h1>

<div class="container">
{% for r in restaurants %}
<div class="card">
    <img src="{{ r.image }}">
    <div class="content">
        <h3>{{ r.name }}</h3>
        <p>{{ r.food }}</p>
        <p>⭐ {{ r.rating }}</p>
    </div>
</div>
{% endfor %}
</div>

</body>
</html>
