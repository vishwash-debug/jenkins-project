<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodieHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f8f8f8;
}

/* NAVBAR */
.navbar {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 15px 50px;
    display: flex;
    justify-content: space-between;
    color: white;
    z-index: 10;
}

.navbar h2 {
    font-weight: 600;
}

.navbar button {
    background: white;
    color: red;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
}

/* HERO */
.hero {
    height: 500px;
    background: url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    text-align: center;
    position: relative;
}

.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

.hero-content {
    position: relative;
}

.hero h1 {
    font-size: 60px;
}

.search-box {
    margin-top: 20px;
    display: flex;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

.search-box input {
    padding: 12px;
    border: none;
    width: 200px;
}

.search-box button {
    background: red;
    color: white;
    border: none;
    padding: 12px 20px;
}

/* SECTION */
.section {
    padding: 50px;
}

.section h2 {
    text-align: center;
    margin-bottom: 30px;
}

/* CARDS */
.cards {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.card {
    width: 200px;
    border-radius: 15px;
    overflow: hidden;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.card p {
    padding: 10px;
    text-align: center;
}

/* RESTAURANTS */
.restaurant {
    width: 260px;
}

.restaurant img {
    height: 180px;
}

/* FOOTER */
.footer {
    background: black;
    color: white;
    padding: 30px;
    text-align: center;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>FoodieHub</h2>
    <button>Login</button>
</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>FoodieHub</h1>
        <p>Discover the best food & drinks</p>

        <div class="search-box">
            <input placeholder="Location">
            <input placeholder="Search food">
            <button>Search</button>
        </div>
    </div>
</div>

<!-- CATEGORIES -->
<div class="section">
    <h2>Top Categories 😎</h2>

    <div class="cards">
        <div class="card"><img src="https://images.unsplash.com/photo-1589308078054-832c1d6b1d03"><p>Biryani</p></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092"><p>Ice Cream</p></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1551024601-bec78aea704b"><p>Chocolates</p></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb"><p>Dry Fruits</p></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c"><p>Veg</p></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1604908176997-4317a7e3f8a7"><p>Non Veg</p></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1625944525903-bc53ccecd3be"><p>Fish</p></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1604908554000-1c7f8c4a1f1b"><p>Meat</p></div>
    </div>
</div>

<!-- RESTAURANTS -->
<div class="section">
    <h2>Popular Restaurants 🍔</h2>

    <div class="cards">

        <div class="card restaurant">
            <img src="https://images.unsplash.com/photo-1604908176997-4317a7e3f8a7">
            <p>Spicy Biryani ⭐ 4.5</p>
        </div>

        <div class="card restaurant">
            <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65">
            <p>Pizza Corner ⭐ 4.2</p>
        </div>

        <div class="card restaurant">
            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
            <p>Burger King ⭐ 4.0</p>
        </div>

        <div class="card restaurant">
            <img src="https://images.unsplash.com/photo-1617196034183-421b4917c92d">
            <p>Ice Cream Hub ⭐ 4.3</p>
        </div>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 FoodieHub | Built with DevOps 🚀</p>
</div>

</body>
</html>
