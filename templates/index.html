<!DOCTYPE html>
<html>
<head>
    <title>Zomato Clone</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f5f5f5;
        }

        /* NAVBAR */
        .navbar {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            color: white;
        }

        /* HERO */
        .hero {
            height: 70vh;
            background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') no-repeat center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 60px;
        }

        .search-box {
            margin-top: 20px;
            display: flex;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .search-box input {
            padding: 12px;
            border: none;
            width: 250px;
        }

        .search-box button {
            background: red;
            color: white;
            border: none;
            padding: 12px 20px;
        }

        /* CATEGORIES */
        .categories {
            padding: 40px;
            text-align: center;
        }

        .category-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .category {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 150px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .category img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }

        /* CARDS */
        .section {
            padding: 40px;
            text-align: center;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            width: 260px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 150px;
        }

        .card-content {
            padding: 15px;
            text-align: left;
        }

        /* FOOTER */
        .footer {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Zomato</h1>
    <p>Discover the best food & drinks</p>

    <div class="search-box">
        <input type="text" placeholder="Location">
        <input type="text" placeholder="Search for food">
        <button>Search</button>
    </div>
</div>

<!-- CATEGORIES -->
<div class="categories">
    <h2>Top Categories</h2>

    <div class="category-box">

        <div class="category">
            <img src="https://images.unsplash.com/photo-1604908176997-4317a7e3f8a7">
            <p>Biryani</p>
        </div>

        <div class="category">
            <img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb">
            <p>Ice Cream</p>
        </div>

        <div class="category">
            <img src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52">
            <p>Chocolates</p>
        </div>

        <div class="category">
            <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c">
            <p>Dry Fruits</p>
        </div>

    </div>
</div>

<!-- RESTAURANTS -->
<div class="section">
    <h2>Popular Restaurants</h2>

    <div class="cards">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1604908176997-4317a7e3f8a7">
            <div class="card-content">
                <h3>Spicy Biryani House</h3>
                ⭐ 4.5
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65">
            <div class="card-content">
                <h3>Pizza Corner</h3>
                ⭐ 4.2
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
            <div class="card-content">
                <h3>Burger King Style</h3>
                ⭐ 4.0
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1563379091339-03246963d7d3">
            <div class="card-content">
                <h3>Royal Biryani</h3>
                ⭐ 4.7
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 Zomato Clone | DevOps Project</p>
</div>

</body>
</html>
